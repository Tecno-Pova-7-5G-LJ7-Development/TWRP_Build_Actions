name: Build TWRP for Tecno Pova 7 5G
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout device tree
        uses: actions/checkout@v4
        with:
          path: device-tree
      
      - name: Setup build environment
        run: |
          sudo apt update
          sudo apt install -y git-core gnupg flex bison build-essential zip curl \
            zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 libncurses5-dev \
            x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils \
            xsltproc unzip fontconfig python3 python-is-python3
          
          # Устанавливаем repo
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/repo
          chmod a+x ~/repo
          sudo mv ~/repo /usr/local/bin/
      
      - name: Initialize and sync TWRP sources
        run: |
          mkdir twrp
          cd twrp
          repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1 --depth=1
          repo sync -j$(nproc) --force-sync
      
      - name: Copy device tree to TWRP source
        run: |
          mkdir -p twrp/device/tecno/lj7
          cp -r device-tree/* twrp/device/tecno/lj7/
          cp -r device-tree/.??* twrp/device/tecno/lj7/ 2>/dev/null || true
      
      - name: Build vendor_boot image
        run: |
          cd twrp
          source build/envsetup.sh
          lunch twrp_lj7-eng
          mka vendor_bootimage
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: twrp-lj7-vendor_boot
          path: twrp/out/target/product/lj7/vendor_boot.img
