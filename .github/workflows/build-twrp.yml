name: Build TWRP
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup build environment
        run: |
          sudo apt update
          sudo apt install -y git-core gnupg flex bison build-essential zip curl \
            zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 libncurses5-dev \
            x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils \
            xsltproc unzip fontconfig python3 python-is-python3
      
      - name: Clone TWRP sources
        run: |
          git clone https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1 twrp
          cd twrp
          repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
          repo sync -j$(nproc)
      
      - name: Copy device tree
        run: |
          cp -r $GITHUB_WORKSPACE twrp/device/tecno/lj7
      
      - name: Build vendor_boot image
        run: |
          cd twrp
          source build/envsetup.sh
          lunch twrp_lj7-eng
          mka vendor_bootimage  # вместо recoveryimage
